name: Reusable Build

on:
  workflow_call:
    inputs:
      mvn-goal:
        required: true
        type: string
      setup-gpg:
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Import GPG key
        if: ${{ inputs.setup-gpg }}
        run: echo "$GPG_PRIVATE_KEY" | gpg --import --batch
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Download Maven settings
        run: |
          mkdir -p ~/.m2
          curl -sL https://raw.githubusercontent.com/alterioncorp/.github/main/maven/settings.xml \
            -o ~/.m2/settings.xml

      - name: Run Maven
        run: mvn ${{ inputs.mvn-goal }}
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_TOKEN: ${{ secrets.CENTRAL_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
